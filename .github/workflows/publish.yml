name: Publish to NPM

on:
  push:
    tags:
      - "v*" # v1.0.0, v0.1.0-beta.1 gibi tag'lerde çalışır

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC için gerekli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (optional)
        run: npm test --if-present

      - name: Build package
        run: npm run build -w bypilot-sdk

      - name: Publish to NPM
        working-directory: ./bypilot-sdk
        run: |
          if [[ ${{ github.ref }} == *"beta"* ]]; then
            npm publish --tag beta --provenance --access public
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
